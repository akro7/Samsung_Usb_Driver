name: Build Samsung Driver Tool

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter darkdetect packaging

    - name: Create Driver Directory
      run: |
        # إنشاء المجلد إذا لم يكن موجوداً لمنع خطأ PyInstaller
        if (!(Test-Path "DriverUsb")) {
            New-Item -ItemType Directory -Path "DriverUsb"
            Write-Host "Directory DriverUsb created successfully."
        }
        # تأكد من وضع ملفات التعريفات داخل هذا المجلد في جهازك قبل الرفع 
        # أو يمكنك إضافة أوامر هنا لتحميلها إذا كانت مخزنة في مكان آخر.

    - name: Build Executable
      run: |
        # التأكد من محتويات المجلد قبل البناء (للتصحيح)
        dir DriverUsb
        
        # بناء الملف التنفيذي
        pyinstaller --onefile --noconsole --uac-admin `
        --collect-all customtkinter `
        --add-data "DriverUsb;DriverUsb" `
        --name "EKO_Samsung_Drivers" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Samsung-Pro-Installer
        path: dist/EKO_Samsung_Drivers.exe
